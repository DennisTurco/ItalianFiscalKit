  assemblies:
  - CodiceFiscale
  namespace: CodiceFiscale
  summary: >-
    Determines whether the specified Codice Fiscale matches the provided personal data.

    The comparison is case-insensitive. Omocodia variants of the CF are normalized before

    comparison.
  example: []
  syntax:
    content: public static bool Matches(string cf, string name, string surname, DateOnly dateOfBirth, Gender gender, string belfioreCode)
    parameters:
    - id: cf
      type: System.String
      description: The Codice Fiscale to check.
    - id: name
      type: System.String
      description: The person''s first name (minimum 3 characters).
    - id: surname
      type: System.String
      description: The person''s surname (minimum 3 characters).
    - id: dateOfBirth
      type: System.DateOnly
      description: The person''s date of birth.
    - id: gender
      type: CodiceFiscale.Enums.Gender
      description: The person''s gender.
    - id: belfioreCode
      type: System.String
      description: The 4-character Belfiore code of the person''s place of birth.
    return:
      type: System.Boolean
      description: >-
        <code>true</code> if the Codice Fiscale is valid and matches the generated CF for the

        provided personal data; otherwise, <code>false</code>.
    content.vb: Public Shared Function Matches(cf As String, name As String, surname As String, dateOfBirth As DateOnly, gender As Gender, belfioreCode As String) As Boolean
