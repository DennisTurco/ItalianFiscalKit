    path: CodiceFiscale/CodiceFiscaleParser.cs
    startLine: 57
  assemblies:
  - CodiceFiscale
  namespace: CodiceFiscale
  summary: Attempts to parse the specified Codice Fiscale without throwing an exception.
  example:
  - >-
    <pre><code class="lang-csharp">if (CodiceFiscaleParser.TryParse("RSSMRA85T10A562S", out CodiceFiscaleData? data))

    {
        Console.WriteLine($"Gender: {data.Gender}, Born: {data.DateOfBirth}");
    }</code></pre>
  syntax:
    content: public static bool TryParse(string cf, out CodiceFiscaleData? data)
    parameters:
    - id: cf
      type: System.String
      description: The Codice Fiscale string to parse. Case-insensitive.
    - id: data
      type: CodiceFiscale.Entities.CodiceFiscaleData
      description: >-
        When this method returns <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a>, contains a <xref href="CodiceFiscale.Entities.CodiceFiscaleData" data-throw-if-not-resolved="false"></xref>

        instance with the gender, date of birth, and Belfiore code extracted from the Codice Fiscale;

        otherwise, <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a>.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if <code class="paramref">cf</code> was parsed successfully;

        otherwise, <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    content.vb: Public Shared Function TryParse(cf As String, data As CodiceFiscaleData) As Boolean
