    path: CodiceFiscale/ItalianVatCodeValidator.cs
    startLine: 20
  assemblies:
  - CodiceFiscale
  namespace: CodiceFiscale
  summary: Validates the specified Italian VAT or fiscal code string.
  example: []
  syntax:
    content: public static bool IsValid(string vat, bool isConsumer, bool isFiscal)
    parameters:
    - id: vat
      type: System.String
      description: The code to validate. Can be an 11-digit Partita IVA or a 16-character Codice Fiscale.
    - id: isConsumer
      type: System.Boolean
      description: >-
        <code>true</code> if the code belongs to a natural person (consumer); the first digit must be 8 or 9.

        <code>false</code> for standard company VAT codes (first digit 0–7).
    - id: isFiscal
      type: System.Boolean
      description: >-
        <code>true</code> to also accept a 16-character Codice Fiscale as valid input in addition to an 11-digit VAT code.

        <code>false</code> to accept only the 11-digit Partita IVA format.
    return:
      type: System.Boolean
      description: <code>true</code> if the code is valid according to the specified rules; otherwise, <code>false</code>.
    content.vb: Public Shared Function IsValid(vat As String, isConsumer As Boolean, isFiscal As Boolean) As Boolean
