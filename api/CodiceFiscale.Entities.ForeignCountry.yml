  assemblies:
  - CodiceFiscale
  namespace: CodiceFiscale.Entities
  summary: Represents a foreign country as encoded in the Italian Codice Fiscale dataset.
  example: []
  syntax:
    content: public ForeignCountry(string CatastalCode, string Name, string Continent, bool Deleted)
    parameters:
    - id: CatastalCode
      type: System.String
      description: >-
        The Belfiore catastal code assigned to the country (e.g. <code>Z614</code> for Venezuela).

        All foreign country codes start with the letter <code>Z</code>.
    - id: Name
      type: System.String
      description: The Italian name of the country (e.g. <code>Venezuela</code>).
    - id: Continent
      type: System.String
      description: The continent to which the country belongs (e.g. <code>America</code>).
    - id: Deleted
      type: System.Boolean
      description: >-
        <code>true</code> if the country code has been abolished (e.g. former states such as Czechoslovakia);

        <code>false</code> for currently active countries.
    content.vb: Public Sub New(CatastalCode As String, Name As String, Continent As String, Deleted As Boolean)
