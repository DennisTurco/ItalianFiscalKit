  assemblies:
  - CodiceFiscale
  namespace: CodiceFiscale
  summary: >-
    Determines whether the specified IBAN string is valid.

    Spaces are ignored. Only SEPA country codes are accepted.
  example: []
  syntax:
    content: public static bool IsValid(string iban)
    parameters:
    - id: iban
      type: System.String
      description: The IBAN string to validate. Spaces are allowed and will be stripped.
    return:
      type: System.Boolean
      description: <code>true</code> if the IBAN is valid and belongs to a SEPA country; otherwise, <code>false</code>.
    content.vb: Public Shared Function IsValid(iban As String) As Boolean
